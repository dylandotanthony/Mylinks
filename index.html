    <style>
      /* 1. Shrink all buttons to half their width and keep them centered */
      .button-stack .button {
          width: 50% !important;
          margin-left: auto !important;
          margin-right: auto !important;
      }

      /* 2. Nextdoor Button Color (It inherits the exact shape from the base .button class!) */
      .button-nextdoor {
          background-color: #82D100 !important;
          color: #ffffff !important;
      }
      
      .button-nextdoor:hover {
          filter: brightness(0.9);
          color: #ffffff !important;
      }

      /* Media Query: Make buttons slightly wider on tiny phone screens so text fits */
      @media (max-width: 576px) {
          .button-stack .button {
              width: 75% !important;
          }
      }
    </style>
