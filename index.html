    <style>
      /* 1. Background & Container */
      html, body {
          background-color: #52C4FA !important; 
          min-height: 100vh;
      }
      .container {
          max-width: 680px !important; 
          margin: 0 auto !important;
          padding-top: 2rem;
      }

      /* 2. Base Structural Styling */
      
      /* NEW: Banner Image Styling */
      .banner-img {
          width: 100%;
          height: auto;
          max-height: 250px;
          object-fit: cover;
          border-radius: 16px;
          margin: 0 auto 20px;
          display: block;
      }

      /* Buttons & Cards with black border */
      .button, .card {
          border: 1px solid #000000 !important;
      }

      .button {
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 14px 20px;
          border-radius: 50px;
          text-decoration: none;
          font-weight: 600;
          transition: transform 0.2s ease, filter 0.2s ease;
          background-color: #ffffff;
          color: #000000;
          margin-bottom: 12px !important;
          width: 100% !important;
      }

      .button:hover {
          transform: translateY(-2px);
          filter: brightness(0.95);
          color: inherit;
          text-decoration: none;
      }

      .icon {
          width: 24px;
          height: 24px;
          margin-right: 12px;
      }
      
      /* Special rounded icon class for your logo on buttons */
      .icon-logo {
          width: 24px;
          height: 24px;
          margin-right: 12px;
          border-radius: 50%;
          object-fit: cover;
      }

      /* Official Facebook Blue Button Styling */
      .button-facebook {
          background-color: #1877F2 !important;
          color: #ffffff !important;
      }
      .button-facebook:hover {
          filter: brightness(0.9);
          color: #ffffff !important;
      }
      .button-facebook img {
          filter: brightness(0) invert(1);
